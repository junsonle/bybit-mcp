# Prefect deployment config for Bybit MCP Server
# Deploy to: https://horizon.prefect.io/

name: bybit-mcp-server

# Pull code from GitHub at runtime
pull:
  - prefect.deployments.steps.git_clone:
      repository: "{{ prefect.variables.repo_url }}"
      branch: "{{ prefect.variables.repo_branch }}"

deployments:
  - name: mcp-server
    entrypoint: deploy.py:mcp_server_flow
    work_pool:
      name: "{{ prefect.variables.work_pool_name }}"
    parameters:
      transport: sse
      host: "0.0.0.0"
      port: 8000
    job_variables:
      env:
        BYBIT_API_KEY: "{{ prefect.variables.bybit_api_key }}"
        BYBIT_SECRET_KEY: "{{ prefect.variables.bybit_secret_key }}"
        BYBIT_TESTNET: "{{ prefect.variables.bybit_testnet }}"
      pip_packages:
        - mcp[cli]>=1.6.0
        - python-dotenv>=1.0.0
        - requests>=2.32.3
        - nest-asyncio>=1.6.0
